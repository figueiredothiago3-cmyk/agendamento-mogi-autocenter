<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel da Oficina | Mogi AutoCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; } </style>
</head>
<body class="min-h-screen flex flex-col text-gray-800">

    <header class="bg-gray-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <span class="bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded hidden sm:block">ADMIN</span>
                <h1 class="font-bold text-xl text-center sm:text-left">Mogi AutoCenter</h1>
            </div>
            <a href="index.html" class="text-sm font-medium text-gray-400 hover:text-white transition bg-gray-800 px-4 py-2 rounded-lg sm:bg-transparent sm:p-0">&larr; Voltar para o Site</a>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 mt-2 sm:mt-4">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 sm:mb-8 gap-4">
            <div>
                <h2 class="text-2xl sm:text-3xl font-bold text-gray-900">Controle de Pátio</h2>
                <p class="text-gray-500 text-sm sm:text-base">Gerencie as entradas e serviços agendados.</p>
            </div>
            
            <div class="bg-white p-2 rounded-lg shadow-sm border border-gray-200 flex items-center gap-2 w-full md:w-auto">
                <label class="text-sm font-semibold text-gray-600 pl-2 whitespace-nowrap">Buscar Data:</label>
                <input type="date" id="inputFiltroData" class="w-full md:w-auto bg-gray-50 border border-gray-300 rounded-md px-3 py-2 text-sm outline-none focus:border-blue-500 transition">
                <button id="btnLimparFiltro" class="text-xs font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 px-3 py-2.5 rounded-md hidden transition">Limpar</button>
            </div>
        </div>

        <!-- 1 coluna no celular, 2 colunas no tablet, 4 no desktop -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="dashboardCards">
            <!-- Preenchido via JS -->
        </div>

        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap min-w-[700px]">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-xs uppercase tracking-wider text-gray-600 font-semibold">
                            <th class="px-6 py-4">Cliente / Contato</th>
                            <th class="px-6 py-4">Serviço Agendado</th>
                            <th class="px-6 py-4">Data e Hora</th>
                            <th class="px-6 py-4">Status do Veículo</th>
                            <th class="px-6 py-4 text-center">Remover</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaAgendamentos" class="divide-y divide-gray-100">
                        <!-- Preenchido via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
