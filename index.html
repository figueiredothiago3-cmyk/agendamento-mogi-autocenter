<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Mogi AutoCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; } </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-blue-800 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-8 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <h1 class="font-bold text-xl tracking-wide">Mogi AutoCenter</h1>
            </div>
            <a href="admin.html" class="text-sm font-medium text-blue-200 hover:text-white transition">Acesso da Oficina &rarr;</a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4 my-8">
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 max-w-lg w-full overflow-hidden">
            <div class="bg-blue-50 p-6 text-center border-b border-blue-100">
                <h2 class="text-2xl font-bold text-blue-900">Agende sua Revisão</h2>
                <p class="text-blue-600 text-sm mt-1">Escolha o serviço e o melhor horário para trazer seu veículo.</p>
            </div>

            <form id="formAgendamento" class="p-8 space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Seu Nome</label>
                    <input required type="text" id="inputNome" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="Nome completo">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">WhatsApp</label>
                    <input required type="tel" id="inputTelefone" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="(00) 00000-0000">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Serviço Necessário</label>
                    <select required id="selectServico" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-gray-700">
                        <option value="">Selecione o que seu carro precisa...</option>
                        <option value="Revisão Preventiva (10.000km)">Revisão Preventiva (10.000km)</option>
                        <option value="Troca de Óleo e Filtros">Troca de Óleo e Filtros</option>
                        <option value="Alinhamento e Balanceamento">Alinhamento e Balanceamento</option>
                        <option value="Inspeção de Freios">Inspeção de Freios</option>
                        <option value="Diagnóstico Computadorizado">Diagnóstico Computadorizado</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Data</label>
                        <input required type="date" id="inputData" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-gray-700">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Horário</label>
                        <select required id="selectHorario" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition disabled:bg-gray-200 text-gray-700" disabled>
                            <option value="">Defina a data</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-700 text-white font-bold text-lg py-3.5 rounded-lg hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 transition-all shadow-md mt-4">
                    Confirmar Agendamento
                </button>
            </form>
        </div>
    </main>

    <!-- Aqui chamamos o script correto -->
    <script src="script.js"></script>
</body>
</html>
